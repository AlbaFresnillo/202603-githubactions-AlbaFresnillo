name: 13 - Working with Outputs
on:
    workflow_dispatch:  
        inputs:
            build-status:
                description: "Choose the build status for the demo"
                required: true
                default: success
                type: choice
                options:
                    - success
                    - failure
jobs:
    build:
        uses: ./.github/workflows/14-inputs-2.yml 
        with:
            use-cache: true
       
    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: ${{ needs.build.outputs.build-status == 'success' }}
        steps:
            - name: Deploy
              run: echo "Deploying"